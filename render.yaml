# Render Blueprint — https://render.com/docs/blueprint-spec
# Set DATABASE_URL and SHOPIFY_API_SECRET manually in Render Dashboard (never commit secrets).
services:
  - type: web
    name: mango-product-feed
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npm run render-start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://mango-product-feed.onrender.com
      - key: SHOPIFY_APP_URL
        value: https://mango-product-feed.onrender.com
      - key: SHOPIFY_API_KEY
        value: 133b57713a5ec35408555486ad242555
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SCOPES
        value: read_products,write_products,read_inventory,read_content
      - key: LOCAL_SHOP_ID
        value: local-shop
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
